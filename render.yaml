services:
  - type: web
    name: silk-route-backend
    runtime: node
    region: oregon
    rootDir: backend
    # NOTE: This render.yaml is NOT read by the live Render service.
    # The silk-route-backend service (srv-d64iqtffte5s73894h8g) was
    # created manually in the Render dashboard, not as a Blueprint.
    # Render reads its buildCommand, startCommand, env vars, etc.
    # from the dashboard UI — this file is cosmetic / documentation-
    # only. Edits here will deploy without effect.
    #
    # To change build behavior, edit the dashboard directly:
    #   https://dashboard.render.com/web/srv-d64iqtffte5s73894h8g
    #
    # The buildCommand below is kept in sync with the current
    # dashboard value for reference and future migration to a
    # Blueprint-managed setup. See CLAUDE.md §2.2 for the rule
    # and the full history of this divergence.
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && (npx tsc || true) && cp -r src/assets dist/backend/src/assets && cp -r src/config dist/backend/src/config
    startCommand: node dist/backend/src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://silkroutelogistics.ai,https://www.silkroutelogistics.ai,https://silk-route-logistics.pages.dev
      - key: PORT
        value: 4000
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@silkroutelogistics.ai
      - key: ENCRYPTION_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
