services:
  - type: web
    name: silk-route-backend
    runtime: node
    region: oregon
    rootDir: backend
    # NOTE: This render.yaml is NOT read by the live Render service.
    # The silk-route-backend service (srv-d64iqtffte5s73894h8g) was
    # created manually in the Render dashboard, not as a Blueprint.
    # Render reads its buildCommand, startCommand, env vars, etc.
    # from the dashboard UI — this file is cosmetic / documentation-
    # only. Edits here will deploy without effect.
    #
    # To change build behavior, edit the dashboard directly:
    #   https://dashboard.render.com/web/srv-d64iqtffte5s73894h8g
    #
    # The buildCommand below is kept in sync with the current
    # dashboard value for reference and future migration to a
    # Blueprint-managed setup. See CLAUDE.md §2.2 for the rule
    # and the full history of this divergence.
    #
    # Sprint 44b (2026-05-09) — canonical build chain restored:
    # `prisma migrate deploy` applies migrations on every deploy;
    # `prisma migrate status --exit-code` is a post-deploy gate
    # that fails the build if any migrations remain pending,
    # catching silent-skip class regressions. See CLAUDE.md §2.2
    # "Production Deployment (Canonical)" for the schema mutation
    # path doc.
    buildCommand: NODE_ENV=development npm install && npm run build && node scripts/check-direct-url.js && npx prisma migrate deploy && npx prisma migrate status && cp -r src/assets/. dist/backend/src/assets/ && cp -r src/config/. dist/backend/src/config/ && cp -r src/lib/. dist/backend/src/lib/
    startCommand: node dist/backend/src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      # v3.8.alf — DIRECT_URL added to docs (was missing from envVars
      # block since v3.8.ajg/ajs shipped the Prisma + Neon DIRECT_URL
      # split). The actual env var IS set on the Render dashboard since
      # 2026-05-24 (otherwise check-direct-url.js in the buildCommand
      # would fail-fast on every deploy + builds have been succeeding).
      # Listing here closes the documentation gap surfaced during
      # v3.8.alf ledger reconciliation. Hostname must NOT contain
      # "-pooler" — the build chain's scripts/check-direct-url.js
      # guard rejects pooled URLs explicitly. See CLAUDE.md §2.2
      # canonical + §11 v3.8.ajg/ajs rows.
      - key: DIRECT_URL
        sync: false
      # v3.8.alf — PRISMA_MIGRATE_LOCK_TIMEOUT added to docs per §2.2
      # canonical (belt-and-suspenders alongside DIRECT_URL — bumps
      # Prisma's advisory-lock acquisition from 10s default to 60s).
      - key: PRISMA_MIGRATE_LOCK_TIMEOUT
        value: "60000"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://silkroutelogistics.ai,https://www.silkroutelogistics.ai,https://silk-route-logistics.pages.dev
      - key: PORT
        value: 4000
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@silkroutelogistics.ai
      - key: ENCRYPTION_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
